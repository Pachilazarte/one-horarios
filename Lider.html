<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ONE — Líder · Horarios</title>
  <link rel="icon" type="image/png" href="img/favicon.png"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/brand.css"/>
  <link rel="stylesheet" href="css/main.css"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <style>
    .login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
    .login-card{background:rgba(255,255,255,.06);border:1px solid rgba(198,201,215,.15);backdrop-filter:blur(22px);border-radius:22px;padding:36px 30px 30px;width:100%;max-width:370px;animation:fadeUp .4s ease both;}
    .lg-brand{display:flex;align-items:center;gap:12px;margin-bottom:26px;}
    .lg-brand .brand-mark{width:44px;height:44px;}
    .fld{margin-bottom:14px;}
    .fld label{font-size:10px;font-weight:700;color:rgba(198,201,215,.55);letter-spacing:.07em;text-transform:uppercase;margin-bottom:5px;display:block;}

    .app-header{position:sticky;top:0;z-index:50;background:rgba(10,8,16,.7);backdrop-filter:blur(22px);border-bottom:1px solid rgba(198,201,215,.09);padding:12px 20px;}
    .app-header__inner{max-width:1100px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;}
    .app-header__brand{display:flex;align-items:center;gap:11px;}
    .main-wrap{max-width:1100px;margin:0 auto;padding:20px 16px 110px;}

    .week-bar{background:rgba(255,255,255,.055);border:1px solid rgba(198,201,215,.13);border-radius:14px;padding:13px 18px;margin-bottom:12px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
    .week-label{font-size:15px;font-weight:800;color:var(--one-cyan);flex:1;}
    .wnav{background:rgba(255,255,255,.07);border:1px solid rgba(198,201,215,.18);color:var(--one-white);width:32px;height:32px;border-radius:50%;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0;}
    .wnav:hover{background:rgba(107,225,227,.15);border-color:rgba(107,225,227,.35);}

    .copy-banner{background:linear-gradient(135deg,rgba(107,225,227,.1),rgba(228,199,106,.08));border:1px solid rgba(107,225,227,.28);border-radius:14px;padding:13px 18px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;}
    .btn-copy{background:linear-gradient(135deg,rgba(107,225,227,.22),rgba(228,199,106,.15));border:1px solid rgba(107,225,227,.38)!important;color:var(--one-cyan);padding:9px 20px;border-radius:999px;font-family:var(--font-title);font-size:13px;font-weight:800;cursor:pointer;transition:all .2s;white-space:nowrap;}
    .btn-copy:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(107,225,227,.18);}

    .cards-grid{display:flex;flex-direction:column;gap:10px;}
    .pcard{background:rgba(255,255,255,.048);border:1px solid rgba(198,201,215,.11);border-radius:14px;overflow:hidden;}
    .pcard-head{display:flex;align-items:center;justify-content:space-between;padding:12px 16px 10px;gap:10px;flex-wrap:wrap;border-bottom:1px solid rgba(198,201,215,.07);}
    .pcard-name{font-size:15px;font-weight:800;}
    .pcard-rol{font-size:11px;color:rgba(198,201,215,.4);margin-top:1px;}
    .pcard-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
    .tot-badge{display:inline-flex;align-items:center;padding:3px 11px;border-radius:999px;background:rgba(107,225,227,.11);border:1px solid rgba(107,225,227,.2);color:var(--one-cyan);font-size:12px;font-weight:800;}
    .btn-split{background:rgba(255,255,255,.05);border:1px solid rgba(198,201,215,.16)!important;color:rgba(198,201,215,.55);padding:5px 12px;border-radius:999px;font-family:var(--font-title);font-size:11px;font-weight:700;cursor:pointer;transition:all .2s;}
    .btn-split:hover{background:rgba(228,199,106,.1);border-color:rgba(228,199,106,.3)!important;color:var(--one-gold);}
    .btn-split.on{background:rgba(228,199,106,.14);border-color:rgba(228,199,106,.38)!important;color:var(--one-gold);}

    .pcard-body{padding:12px 16px 14px;}
    .dias-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;}
    @media(max-width:680px){.dias-grid{grid-template-columns:repeat(3,1fr);}}
    @media(max-width:400px){.dias-grid{grid-template-columns:repeat(2,1fr);}}

    .dia-col{display:flex;flex-direction:column;gap:3px;}
    .dia-lbl{font-size:10px;font-weight:800;color:rgba(198,201,215,.5);text-align:center;text-transform:uppercase;letter-spacing:.05em;}
    .dia-fecha{font-size:9px;color:rgba(198,201,215,.28);text-align:center;margin-bottom:3px;}

    .ht{background:rgba(255,255,255,.07);border:1px solid rgba(198,201,215,.16);color:var(--one-white);padding:7px 4px;border-radius:8px;font-family:var(--font-title);font-size:14px;font-weight:800;width:100%;text-align:center;transition:border-color .15s,background .15s;}
    .ht:focus{outline:none;border-color:rgba(107,225,227,.55);background:rgba(107,225,227,.06);}
    .ht::placeholder{color:rgba(198,201,215,.2);font-weight:400;font-size:11px;}
    .ht.v{border-color:rgba(107,225,227,.3);color:var(--one-cyan);}
    .ht.err{border-color:rgba(239,68,68,.5)!important;color:var(--color-danger-text)!important;}
    .sep{font-size:9px;color:rgba(198,201,215,.22);text-align:center;line-height:1.2;}

    .split-sec{display:none;flex-direction:column;gap:3px;margin-top:5px;padding-top:6px;border-top:1px dashed rgba(228,199,106,.25);}
    .split-sec.show{display:flex;}
    .split-lbl{font-size:9px;color:rgba(228,199,106,.55);text-align:center;font-weight:700;letter-spacing:.04em;margin-bottom:1px;}

    .obs-inp{background:rgba(255,255,255,.04);border:1px solid rgba(198,201,215,.1);color:var(--one-white);padding:7px 10px;border-radius:8px;font-family:var(--font-body);font-size:12px;width:100%;margin-top:10px;}
    .obs-inp:focus{outline:none;border-color:rgba(107,225,227,.3);}
    .obs-inp::placeholder{color:rgba(198,201,215,.25);}

    .guard-bar{position:fixed;bottom:0;left:0;right:0;z-index:40;background:rgba(10,8,16,.93);backdrop-filter:blur(18px);border-top:1px solid rgba(198,201,215,.1);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;}
    .ginfo{font-size:12px;color:rgba(198,201,215,.4);}
    .ginfo strong{color:var(--one-white);}
    .gstatus{font-size:11px;margin-top:2px;}
    .btn-save{background:linear-gradient(135deg,rgba(34,197,94,.28),rgba(34,197,94,.13));border:1px solid rgba(34,197,94,.48)!important;color:var(--color-success-text);padding:12px 30px;border-radius:999px;font-family:var(--font-title);font-size:15px;font-weight:800;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:8px;}
    .btn-save:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(34,197,94,.18);}
    .btn-save:disabled{opacity:.4;cursor:not-allowed;transform:none;}

    .sp{display:inline-block;width:14px;height:14px;border:2px solid rgba(107,225,227,.3);border-top-color:var(--one-cyan);border-radius:50%;animation:spin .7s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg)}}
    .no-data{text-align:center;padding:40px;color:rgba(198,201,215,.3);font-size:14px;}
    #loadOvl{position:fixed;inset:0;z-index:200;background:rgba(10,8,16,.72);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;}
    #loadOvl.h{display:none;}
    .lovlsp{width:36px;height:36px;border:3px solid rgba(107,225,227,.2);border-top-color:var(--one-cyan);border-radius:50%;animation:spin .8s linear infinite;}
  </style>
</head>
<body>
<div class="bg-layer" aria-hidden="true"></div>
<div class="app-wrap">

<div id="loadOvl"><div class="lovlsp"></div><div style="font-size:13px;color:rgba(198,201,215,.55);">Cargando...</div></div>

<!-- LOGIN -->
<div id="vLogin" style="display:none;">
  <div class="login-wrap">
    <div class="login-card">
      <div class="lg-brand">
        <div class="brand-mark"></div>
        <div>
          <div style="font-family:var(--font-title);font-weight:800;font-size:17px;">ONE <span class="brand-gc">Horarios</span></div>
          <span style="font-size:11px;color:rgba(198,201,215,.45);">Panel de líderes de área</span>
        </div>
      </div>
      <div class="fld"><label>Usuario</label>
        <input class="inp" id="lgU" type="text" placeholder="Tu usuario..." autocapitalize="off"
          onkeydown="if(event.key==='Enter')document.getElementById('lgP').focus()"/>
      </div>
      <div class="fld"><label>Contraseña</label>
        <input class="inp" id="lgP" type="password" placeholder="Tu contraseña..."
          onkeydown="if(event.key==='Enter')login()"/>
      </div>
      <div id="lgErr" style="display:none;color:var(--color-danger-text);font-size:12px;margin-bottom:12px;padding:8px 12px;background:rgba(239,68,68,.1);border-radius:8px;border:1px solid rgba(239,68,68,.22);">
        Usuario o contraseña incorrectos.
      </div>
      <button class="btn btn-success" style="width:100%;justify-content:center;" onclick="login()">Ingresar →</button>
      <div style="margin-top:16px;text-align:center;">
        <a href="index.html" style="font-size:12px;color:rgba(198,201,215,.3);">← Volver al inicio</a>
      </div>
    </div>
  </div>
</div>

<!-- PANEL -->
<div id="vPanel" style="display:none;">
  <!-- SELECTOR DE ÁREA (solo para líderes con múltiples áreas) -->
  <div id="selectorAreaWrap" style="display:none;min-height:100vh;align-items:center;justify-content:center;padding:20px;">
    <div style="background:rgba(255,255,255,.06);border:1px solid rgba(198,201,215,.15);backdrop-filter:blur(22px);border-radius:22px;padding:36px 30px 30px;width:100%;max-width:420px;animation:fadeUp .4s ease both;">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:24px;">
        <div class="brand-mark"></div>
        <div>
          <div style="font-family:var(--font-title);font-weight:800;font-size:17px;">ONE <span class="brand-gc">Horarios</span></div>
          <span id="selectorNombre" style="font-size:11px;color:rgba(198,201,215,.45);">Seleccioná el área a cargar</span>
        </div>
      </div>
      <div style="font-size:11px;font-weight:700;color:rgba(198,201,215,.4);text-transform:uppercase;letter-spacing:.07em;margin-bottom:12px;">¿Qué área querés cargar?</div>
      <div id="selectorAreaBtns" style="display:flex;flex-direction:column;gap:10px;"></div>
      <div style="margin-top:18px;text-align:center;">
        <button class="btn btn-ghost" onclick="logout()" style="font-size:12px;padding:6px 16px;opacity:.6;">Salir</button>
      </div>
    </div>
  </div>

  <div id="panelHorarios" style="display:none;">
  <header class="app-header">
    <div class="app-header__inner">
      <div class="app-header__brand">
        <div class="brand-mark"></div>
        <div>
          <div style="font-family:var(--font-title);font-weight:800;font-size:16px;">ONE <span class="brand-gc">Horarios</span></div>
          <span style="font-size:10px;color:rgba(198,201,215,.45);" id="hdrSub">Panel líderes</span>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
        <span id="hdrBadge" class="badge" style="font-size:11px;"></span>
        <button id="btnCambiarArea" onclick="mostrarSelectorArea()" class="btn btn-ghost" style="display:none;font-size:12px;padding:6px 12px;">⇄ Cambiar área</button>
        <a href="index.html" class="btn btn-ghost" style="font-size:12px;padding:6px 12px;">← Inicio</a>
        <button class="btn btn-ghost" onclick="logout()" style="font-size:12px;padding:6px 12px;">Salir</button>
      </div>
    </div>
  </header>

  <div class="main-wrap">
    <!-- SEMANA -->
    <div class="week-bar">
      <button class="wnav" onclick="movSem(-1)">‹</button>
      <div class="week-label" id="wkLabel">—</div>
      <button class="wnav" onclick="movSem(1)">›</button>
      <button class="btn btn-ghost" style="font-size:12px;padding:6px 14px;" onclick="goHoy()">Hoy</button>
    </div>

    <!-- COPIAR SEMANA ANTERIOR -->
    <div class="copy-banner" id="copyBanner" style="display:none;">
      <div>
        <div style="font-size:13px;font-weight:700;">📋 Hay horarios de la semana anterior guardados</div>
        <div style="font-size:11px;color:rgba(198,201,215,.45);margin-top:2px;" id="copyBannerSub"></div>
      </div>
      <button class="btn-copy" onclick="copiarAnterior()">⟳ Copiar semana anterior</button>
    </div>

    <!-- OBS ÁREA -->
    <div style="margin-bottom:12px;">
      <input class="inp" id="obsArea" type="text" placeholder="Observación general del área (opcional)..." style="border-radius:10px;"/>
    </div>

    <!-- CARDS -->
    <div class="cards-grid" id="cardsGrid">
      <div class="no-data"><span class="sp"></span></div>
    </div>
  </div>

  <!-- GUARD BAR -->
  <div class="guard-bar">
    <div>
      <div class="ginfo">Área: <strong id="gbArea">—</strong> · Semana <strong id="gbSem">—</strong></div>
      <div class="gstatus" id="gbSt" style="color:rgba(198,201,215,.35);"></div>
    </div>
    <button class="btn-save" id="btnSave" onclick="guardar()">
      <span id="sIco">✓</span> <span id="sTxt">Guardar horarios</span>
    </button>
  </div>
</div>

</div><!-- /panelHorarios -->
</div>
<div class="toast" id="toast"></div>

<script>
/* ── SUPABASE ── */
const SUPA_URL='https://qbgihaatifllskqveavg.supabase.co';
const SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFiZ2loYWF0aWZsbHNrcXZlYXZnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3NzE1MzcsImV4cCI6MjA4OTM0NzUzN30.x91ZvjEqGxiSuG9B0T_jOLclx2TT8u3VCG7N1KNOYA4';
const SB=supabase.createClient(SUPA_URL,SUPA_KEY);

/* ── LÍDERES ── */
const LIDERES={
  'MARCELA':{areas:['INNOVACION Y DESARROLLO'],           nombre:'Marcela'},
  'AYELEN' :{areas:['RECURSOS HUMANOS'],                  nombre:'Ayelén'},
  'JEINMIS':{areas:['MARKETING'],                         nombre:'Jeinmis'},
  'FABIANA':{areas:['ACADEMICO / GT','COMERCIAL'],        nombre:'Fabiana'},
  'MONICA' :{areas:['MAESTRANZA'],                        nombre:'Mónica'},
  'MELINA' :{areas:['ADMINISTRACION'],                    nombre:'Melina'},
};
const ACOLOR={
  'ADMINISTRACION':'#6be1e3','COMERCIAL':'#e17bd7','RECURSOS HUMANOS':'#e4c76a',
  'MARKETING':'#f472b6','ACADEMICO / GT':'#a78bfa',
  'INNOVACION Y DESARROLLO':'#34d399','MAESTRANZA':'#fb923c',
};
const DIAS=['lunes','martes','miercoles','jueves','viernes','sabado'];
const DLAN=['Lun','Mar','Mié','Jue','Vie','Sáb'];

/* ── ESTADO ── */
let sess=null, areaActual='', rows=[], antData=null, rowId=null, semD='', semH='', offSem=0;

/* ── UTILS ── */
const hoy=()=>new Date().toISOString().slice(0,10);
const getLun=(s,off=0)=>{const d=new Date(s+'T12:00:00');const w=d.getDay();d.setDate(d.getDate()+(w===0?-6:1-w)+off*7);return d.toISOString().slice(0,10);};
const getSab=s=>{const d=new Date(getLun(s)+'T12:00:00');d.setDate(d.getDate()+5);return d.toISOString().slice(0,10);};
const fmt=s=>{if(!s)return'';const[y,m,d]=s.split('-');return`${d}/${m}`;};
const fmtL=s=>{if(!s)return'';const[y,m,d]=s.split('-');return`${d}/${m}/${y}`;};
const calcHs=(e,s)=>{if(!e||!s)return null;const[eh,em]=e.split(':').map(Number);const[sh,sm]=s.split(':').map(Number);const m=(sh*60+sm)-(eh*60+em);return m>0?m/60:null;};
const fmtHs=h=>{if(!h)return'—';const hr=Math.floor(h),mn=Math.round((h-hr)*60);return mn?`${hr}h ${mn}m`:`${hr}h`;};
const toast=(msg,t='ok')=>{const el=document.getElementById('toast');el.textContent=msg;el.className=`toast ${t} show`;clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('show'),3200);};
const ovl=show=>document.getElementById('loadOvl').classList.toggle('h',!show);
const diasSem=lun=>Array.from({length:6},(_,i)=>{const d=new Date(lun+'T12:00:00');d.setDate(d.getDate()+i);return d.toISOString().slice(0,10);});

/* Normalizar hora ingresada: "9","930","9:30" → "09:30" */
const normH=raw=>{
  if(!raw||!raw.trim())return'';
  let s=raw.trim().replace(/[.,]/,':');
  let h,m;
  if(s.includes(':'))[h,m]=s.split(':');
  else if(s.length<=2){h=s;m='0';}
  else{h=s.slice(0,s.length-2);m=s.slice(-2);}
  h=parseInt(h,10);m=parseInt(m,10);
  if(isNaN(h)||isNaN(m)||h<0||h>23||m<0||m>59)return'';
  return`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
};

/* ─── LOGIN ─── */
function login(){
  const u=(document.getElementById('lgU').value||'').trim().toUpperCase();
  const p=(document.getElementById('lgP').value||'').trim().toUpperCase();
  const l=LIDERES[u];
  if(!l||p!==u){document.getElementById('lgErr').style.display='';document.getElementById('lgP').value='';document.getElementById('lgP').focus();return;}
  document.getElementById('lgErr').style.display='none';
  sess=l;sessionStorage.setItem('ls',JSON.stringify(l));
  abrirPanel();
}
function logout(){
  sessionStorage.removeItem('ls');sess=null;areaActual='';rows=[];antData=null;rowId=null;
  document.getElementById('vPanel').style.display='none';
  document.getElementById('vLogin').style.display='block';
  document.getElementById('lgU').value='';document.getElementById('lgP').value='';
}

/* ─── PANEL ─── */
function abrirPanel(){
  document.getElementById('vLogin').style.display='none';
  document.getElementById('vPanel').style.display='block';
  const{areas,nombre}=sess;
  document.getElementById('hdrSub').textContent=`Hola, ${nombre} 👋`;
  if(areas.length===1){
    // Una sola área: cargar directo
    setAreaActual(areas[0]);
  } else {
    // Múltiples áreas: mostrar selector
    mostrarSelectorArea();
  }
}

function mostrarSelectorArea(){
  const{areas,nombre}=sess;
  // Ocultar panel de horarios, mostrar selector
  document.getElementById('selectorAreaWrap').style.display='flex';
  document.getElementById('panelHorarios').style.display='none';

  const btnContainer=document.getElementById('selectorAreaBtns');
  btnContainer.innerHTML=areas.map(a=>{
    const col=ACOLOR[a]||'#a4a8c0';
    return `<button onclick="setAreaActual('${a}')"
      style="background:${col}18;border:2px solid ${col}44;color:${col};padding:18px 24px;border-radius:14px;font-family:var(--font-title);font-size:15px;font-weight:800;cursor:pointer;transition:all .2s;text-align:left;width:100%;"
      onmouseover="this.style.borderColor='${col}';this.style.background='${col}28'"
      onmouseout="this.style.borderColor='${col}44';this.style.background='${col}18'">
      ${a}
    </button>`;
  }).join('');
}

function setAreaActual(area){
  areaActual=area;
  sessionStorage.setItem('lsArea',area);
  const col=ACOLOR[area]||'#a4a8c0';
  const b=document.getElementById('hdrBadge');
  b.textContent=area;
  b.style.cssText=`background:${col}22;border:1px solid ${col}44;color:${col};padding:3px 10px;border-radius:999px;font-size:11px;font-weight:800;`;

  // Si tiene múltiples áreas, mostrar botón cambiar área
  const btnCambiar=document.getElementById('btnCambiarArea');
  if(btnCambiar) btnCambiar.style.display=sess.areas.length>1?'':'none';

  // Mostrar panel horarios, ocultar selector
  document.getElementById('selectorAreaWrap').style.display='none';
  document.getElementById('panelHorarios').style.display='';

  offSem=0; actuSem();
}
function actuSem(){
  semD=getLun(hoy(),offSem);semH=getSab(semD);
  document.getElementById('wkLabel').textContent=`📅 ${fmt(semD)} al ${fmtL(semH)}`;
  document.getElementById('gbSem').textContent=`${fmt(semD)} al ${fmt(semH)}`;
  document.getElementById('gbArea').textContent=areaActual;
  cargar();
}
function movSem(d){offSem+=d;actuSem();}
function goHoy(){offSem=0;actuSem();}

/* ─── CARGAR DATOS ─── */
async function cargar(){
  const area=areaActual;
  document.getElementById('cardsGrid').innerHTML='<div class="no-data"><span class="sp"></span></div>';
  document.getElementById('copyBanner').style.display='none';
  rowId=null; antData=null;

  /* Personal del área */
  const{data:personal,error:eP}=await SB
    .from('personal').select('nombre,rol')
    .eq('area',area).eq('activo',true).order('nombre');

  if(eP||!personal?.length){
    document.getElementById('cardsGrid').innerHTML=`<div class="no-data">${eP?'Error al cargar personal.':'Sin personal activo en el área.'}</div>`;
    ovl(false);return;
  }

  /* Fila de esta semana (1 sola fila por área/semana) */
  const{data:actual}=await SB
    .from('horarios_semanales').select('*')
    .eq('area',area).eq('semana_desde',semD)
    .maybeSingle();

  rowId = actual?.id || null;
  document.getElementById('obsArea').value = actual?.observaciones || '';

  /* Fila semana anterior */
  const lAnt=getLun(semD,-1);
  const{data:ant}=await SB
    .from('horarios_semanales').select('*')
    .eq('area',area).eq('semana_desde',lAnt)
    .maybeSingle();

  if(ant?.horarios?.length){
    antData=ant.horarios;
    document.getElementById('copyBannerSub').textContent=
      `Semana ${fmt(lAnt)} al ${fmtL(getSab(lAnt))} · ${ant.horarios.length} persona(s)`;
    document.getElementById('copyBanner').style.display='flex';
  }

  /* Construir rows: combinar personal con horarios guardados */
  const savedMap={};
  (actual?.horarios||[]).forEach(h=>savedMap[h.nombre]=h);

  rows=personal.map(p=>{
    const sv=savedMap[p.nombre];
    const r={nombre:p.nombre,rol:p.rol||'',obs:sv?.obs||'',split:false};
    DIAS.forEach(d=>{
      r[d+'_e'] =sv?.[d]?.e  ||'';
      r[d+'_s'] =sv?.[d]?.s  ||'';
      r[d+'_e2']=sv?.[d]?.e2 ||'';
      r[d+'_s2']=sv?.[d]?.s2 ||'';
    });
    r.split=DIAS.some(d=>r[d+'_e2']);
    return r;
  });

  renderCards();
  ovl(false);
}

/* ─── COPIAR SEMANA ANTERIOR ─── */
function copiarAnterior(){
  if(!antData)return;
  const antMap={};antData.forEach(h=>antMap[h.nombre]=h);
  let c=0;
  rows.forEach(r=>{
    const a=antMap[r.nombre];if(!a)return;
    DIAS.forEach(d=>{
      r[d+'_e'] =a[d]?.e  ||'';r[d+'_s'] =a[d]?.s  ||'';
      r[d+'_e2']=a[d]?.e2 ||'';r[d+'_s2']=a[d]?.s2 ||'';
    });
    if(a.obs)r.obs=a.obs;
    r.split=DIAS.some(d=>r[d+'_e2']);
    c++;
  });
  renderCards();
  document.getElementById('copyBanner').style.display='none';
  toast(`✓ ${c} horario(s) copiados — editá lo que cambió`);
  dirty('Copia aplicada — guardá cuando estés listo');
}

/* ─── RENDER CARDS ─── */
function renderCards(){
  const fArr=diasSem(semD);
  const grid=document.getElementById('cardsGrid');
  if(!rows.length){grid.innerHTML='<div class="no-data">Sin personal activo.</div>';return;}

  grid.innerHTML=rows.map((r,i)=>{
    const tot=calcTot(r);const sp=r.split;
    const dcols=DIAS.map((d,di)=>`
      <div class="dia-col">
        <div class="dia-lbl">${DLAN[di]}</div>
        <div class="dia-fecha">${fmt(fArr[di])}</div>
        <input class="ht ${r[d+'_e']?'v':''}" type="text" maxlength="5" placeholder="09:00" value="${r[d+'_e']}"
          oninput="upd(${i},'${d}_e',this)" onblur="fmt2(${i},'${d}_e',this)"/>
        <div class="sep">↓</div>
        <input class="ht ${r[d+'_s']?'v':''}" type="text" maxlength="5" placeholder="17:00" value="${r[d+'_s']}"
          oninput="upd(${i},'${d}_s',this)" onblur="fmt2(${i},'${d}_s',this)"/>
        <div class="split-sec ${sp?'show':''}" id="sp_${i}_${d}">
          <div class="split-lbl">2° turno</div>
          <input class="ht ${r[d+'_e2']?'v':''}" type="text" maxlength="5" placeholder="—" value="${r[d+'_e2']}"
            oninput="upd(${i},'${d}_e2',this)" onblur="fmt2(${i},'${d}_e2',this)"/>
          <div class="sep">↓</div>
          <input class="ht ${r[d+'_s2']?'v':''}" type="text" maxlength="5" placeholder="—" value="${r[d+'_s2']}"
            oninput="upd(${i},'${d}_s2',this)" onblur="fmt2(${i},'${d}_s2',this)"/>
        </div>
      </div>`).join('');

    return`<div class="pcard" id="pc${i}">
      <div class="pcard-head">
        <div><div class="pcard-name">${r.nombre}</div><div class="pcard-rol">${r.rol||'—'}</div></div>
        <div class="pcard-meta">
          <span class="tot-badge" id="tot${i}">${tot>0?fmtHs(tot):'—'}</span>
          <button class="btn-split ${sp?'on':''}" id="spBtn${i}" onclick="togSplit(${i})">
            ${sp?'✂ Partido ON':'✂ Turno partido'}
          </button>
        </div>
      </div>
      <div class="pcard-body">
        <div class="dias-grid">${dcols}</div>
        <input class="obs-inp" type="text"
          placeholder="Observación de ${r.nombre} (opcional)..."
          value="${(r.obs||'').replace(/"/g,'&quot;')}"
          oninput="updObs(${i},this.value)"/>
      </div>
    </div>`;
  }).join('');
}

/* ─── TOGGLE TURNO PARTIDO ─── */
function togSplit(i){
  rows[i].split=!rows[i].split;const on=rows[i].split;
  const btn=document.getElementById('spBtn'+i);
  if(btn){btn.textContent=on?'✂ Partido ON':'✂ Turno partido';btn.classList.toggle('on',on);}
  DIAS.forEach(d=>{
    const el=document.getElementById(`sp_${i}_${d}`);
    if(el)el.classList.toggle('show',on);
  });
  if(!on){
    DIAS.forEach(d=>{rows[i][d+'_e2']='';rows[i][d+'_s2']='';});
    document.querySelectorAll(`#pc${i} .split-sec input`).forEach(inp=>{inp.value='';inp.classList.remove('v','err');});
    updTot(i);
  }
}

/* ─── UPDATES ─── */
function upd(i,k,inp){rows[i][k]=inp.value;inp.classList.remove('err');inp.classList.toggle('v',!!inp.value.trim());updTot(i);dirty();}
function fmt2(i,k,inp){
  const n=normH(inp.value);rows[i][k]=n;inp.value=n;
  if(inp.value&&!n)inp.classList.add('err');
  else{inp.classList.remove('err');inp.classList.toggle('v',!!n);}
  updTot(i);
}
function updObs(i,v){rows[i].obs=v;dirty();}
function updTot(i){const el=document.getElementById('tot'+i);if(el)el.textContent=fmtHs(calcTot(rows[i]));}
function calcTot(r){
  let t=0;DIAS.forEach(d=>{
    const h1=calcHs(r[d+'_e'],r[d+'_s']);const h2=calcHs(r[d+'_e2'],r[d+'_s2']);
    if(h1)t+=h1;if(h2)t+=h2;
  });return t;
}
function dirty(msg){
  const el=document.getElementById('gbSt');
  el.textContent=msg||'● Cambios sin guardar';
  el.style.color=msg?'rgba(198,201,215,.6)':'var(--one-gold)';
}

/* ─── GUARDAR — 1 SOLA FILA POR ÁREA/SEMANA ─── */
async function guardar(){
  if(!semD||!sess){toast('Error de sesión','err');return;}
  const btn=document.getElementById('btnSave');
  btn.disabled=true;
  document.getElementById('sIco').textContent='⏳';
  document.getElementById('sTxt').textContent='Guardando...';

  /* Construir array JSON de horarios */
  const horarios=rows.map(r=>{
    const obj={nombre:r.nombre,rol:r.rol,obs:r.obs||''};
    DIAS.forEach(d=>{
      obj[d]={e:r[d+'_e']||'',s:r[d+'_s']||'',e2:r[d+'_e2']||'',s2:r[d+'_s2']||''};
    });
    return obj;
  });

  const payload={
    semana_desde:semD,
    semana_hasta:semH,
    area:areaActual,
    observaciones:document.getElementById('obsArea').value.trim()||null,
    horarios,          /* ← TODO en una sola columna JSONB */
  };

  let error;
  if(rowId){
    /* UPDATE — ya existe la fila para esta semana/área */
    ({error}=await SB.from('horarios_semanales').update(payload).eq('id',rowId));
  } else {
    /* INSERT — primera vez que se carga esta semana/área */
    const res=await SB.from('horarios_semanales').insert(payload).select('id').single();
    error=res.error;
    if(!error&&res.data?.id) rowId=res.data.id;
  }

  btn.disabled=false;
  document.getElementById('sIco').textContent=error?'⚠':'✓';
  document.getElementById('sTxt').textContent='Guardar horarios';

  if(error){
    console.error(error);
    toast('Error al guardar: '+error.message,'err');
    document.getElementById('gbSt').textContent='⚠ Error al guardar';
    document.getElementById('gbSt').style.color='var(--color-danger-text)';
  } else {
    toast('✓ Horarios guardados correctamente');
    document.getElementById('gbSt').textContent='✓ Guardado';
    document.getElementById('gbSt').style.color='var(--color-success-text)';
  }
}

/* ─── INIT ─── */
document.addEventListener('DOMContentLoaded',()=>{
  const s=sessionStorage.getItem('ls');
  if(s){try{
    sess=JSON.parse(s);
    // Compatibilidad: si la sesión guardada tiene area (string viejo) convertir a areas[]
    if(sess.area&&!sess.areas) sess.areas=[sess.area];
    // Restaurar área activa si estaba guardada
    const savedArea=sessionStorage.getItem('lsArea');
    if(savedArea&&sess.areas.includes(savedArea)) areaActual=savedArea;
    abrirPanel();return;
  }catch{}}
  ovl(false);
  document.getElementById('vLogin').style.display='block';
});
</script>
