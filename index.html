<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ONE — Registrar Horario</title>
  <link rel="icon" type="image/png" href="img/favicon.png"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/brand.css"/>
  <link rel="stylesheet" href="css/main.css"/>
</head>
<body>
<div class="bg-layer" aria-hidden="true"></div>
<div class="app-wrap">

<header class="app-header">
  <div class="app-header__inner">
    <div class="app-header__brand">
      <div class="brand-mark"></div>
      <div>
        <div class="brand-name">ONE <span class="brand-gc">Horarios</span></div>
        <span class="brand-sub">Panel de registro</span>
      </div>
    </div>
  </div>
</header>

<main style="max-width:560px;margin:0 auto;padding:24px 16px 80px;">

  <div style="text-align:center;margin-bottom:22px;">
    <img src="img/one-logocolor.png" alt="ONE" style="height:44px;margin:0 auto 8px;" onerror="this.style.display='none'"/>
    <p style="color:rgba(198,201,215,.45);font-size:12px;">Escencial Consultora</p>
  </div>

  <!-- BANNER OK -->
  <div id="lOkBanner" style="display:none;margin-bottom:14px;" class="ok-banner">
    <div style="font-size:22px;margin-bottom:4px;">✅</div>
    <div style="font-size:15px;font-weight:800;color:var(--color-success-text);" id="lOkMsg">¡Registrado!</div>
    <div style="font-size:12px;color:rgba(134,239,172,.6);margin-top:2px;">Para cargar otro, completá el formulario y guardá de nuevo.</div>
  </div>

  <!-- COLA SESIÓN -->
  <div id="lQSec" style="display:none;margin-bottom:14px;">
    <div style="font-size:11px;font-weight:700;color:rgba(198,201,215,.42);text-transform:uppercase;letter-spacing:.07em;margin-bottom:7px;">
      Esta sesión — <span id="lQCnt">0</span>
    </div>
    <div id="lQList" style="display:flex;flex-direction:column;gap:6px;"></div>
  </div>

  <!-- FORMULARIO -->
  <div class="glass" style="padding:22px;margin-bottom:14px;">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:6px;">
      <h2 style="font-size:18px;font-weight:800;">Registrar <span class="brand-gc">horario</span></h2>
      <!-- Navegación de fecha -->
      <div style="display:flex;align-items:center;gap:6px;">
        <button onclick="lCambiarFecha(-1)" title="Día anterior"
          style="background:rgba(255,255,255,.07);border:1px solid rgba(198,201,215,.18);color:rgba(198,201,215,.7);
                 width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:16px;line-height:1;
                 display:flex;align-items:center;justify-content:center;transition:all .2s;"
          onmouseover="this.style.background='rgba(107,225,227,.15)';this.style.color='#6be1e3';"
          onmouseout="this.style.background='rgba(255,255,255,.07)';this.style.color='rgba(198,201,215,.7)';">‹</button>
        <span style="font-size:13px;color:rgba(198,201,215,.65);white-space:nowrap;" id="fechaDisplay"></span>
        <button id="flechaSig" onclick="lCambiarFecha(1)" title="Día siguiente"
          style="background:rgba(255,255,255,.07);border:1px solid rgba(198,201,215,.18);color:rgba(198,201,215,.7);
                 width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:16px;line-height:1;
                 display:flex;align-items:center;justify-content:center;transition:all .2s;"
          onmouseover="this.style.background='rgba(107,225,227,.15)';this.style.color='#6be1e3';"
          onmouseout="this.style.background='rgba(255,255,255,.07)';this.style.color='rgba(198,201,215,.7)';">›</button>
      </div>
    </div>

    <input type="hidden" id="lFecha"/>

    <!-- ÁREA + NOMBRE -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:11px;">
      <div>
        <label class="lbl">Área *</label>
        <select class="inp" id="lArea" onchange="lLoadPers()">
          <option value="">Seleccionar...</option>
          <option>ADMINISTRACION</option><option>COMERCIAL</option><option>RECURSOS HUMANOS</option>
          <option>MARKETING</option><option>ACADEMICO / GT</option><option>INNOVACION Y DESARROLLO</option><option>MAESTRANZA</option>
        </select>
      </div>
      <div>
        <label class="lbl">Nombre *</label>
        <select class="inp" id="lNom" onchange="lOnPersona()">
          <option value="">Seleccioná área primero</option>
        </select>
      </div>
    </div>

    <!-- INFO HORARIO PLANIFICADO -->
    <div id="lPlanInfo" style="display:none;margin-bottom:11px;padding:10px 13px;background:rgba(107,225,227,.06);border:1px solid rgba(107,225,227,.18);border-radius:10px;display:flex;align-items:center;flex-wrap:wrap;gap:4px;"></div>

    <!-- HORAS -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:11px;">
      <div>
        <label class="lbl">Hora de Entrada *</label>
        <input class="time-inp" type="time" id="lEnt" oninput="lUpdCalc()" onchange="lUpdCalc()"/>
        <div id="lInfoT" style="font-size:12px;font-weight:700;margin-top:4px;min-height:16px;"></div>
      </div>
      <div>
        <label class="lbl">Hora de Salida <span style="font-size:10px;font-weight:400;opacity:.4;">(opcional)</span></label>
        <input class="time-inp" type="time" id="lSal" oninput="lUpdCalc()" onchange="lUpdCalc()"/>
        <div id="lInfoH" style="font-size:12px;font-weight:700;margin-top:4px;min-height:16px;"></div>
      </div>
    </div>

    <!-- OBSERVACIONES -->
    <div style="margin-bottom:16px;">
      <label class="lbl">Observaciones <span style="font-size:10px;font-weight:400;opacity:.4;">(opcional)</span></label>
      <input class="inp" type="text" id="lObs" placeholder="Notas opcionales..."/>
    </div>

    <button class="btn btn-success" onclick="lGuardar()" id="lBtnG">
      <span id="lBIco">✅</span><span id="lBTxt">Guardar registro</span>
    </button>
  </div>

  <!-- ACCESO ADMIN -->
  <div style="text-align:center;">
    <button class="btn btn-ghost" onclick="showAdminLogin()" id="btnShowAdmin" style="font-size:12px;padding:6px 16px;opacity:.6;">
      🔐 Acceder como administrador
    </button>
    <div id="adminLoginBox" style="display:none;margin-top:10px;" class="glass fade-in">
      <div style="padding:16px 18px;">
        <div style="font-size:12px;font-weight:700;margin-bottom:10px;color:rgba(198,201,215,.6);">Panel Administrador</div>
        <div style="display:flex;gap:7px;flex-wrap:wrap;margin-bottom:9px;">
          <input class="inp" type="text"     id="aU" placeholder="Usuario"    style="flex:1;min-width:90px;" onkeydown="if(event.key==='Enter')loginAdmin()"/>
          <input class="inp" type="password" id="aP" placeholder="Contraseña" style="flex:1;min-width:90px;" onkeydown="if(event.key==='Enter')loginAdmin()"/>
        </div>
        <button class="btn btn-primary" onclick="loginAdmin()" style="width:100%;justify-content:center;padding:9px;">Ingresar</button>
      </div>
    </div>
  </div>

</main>

<footer class="app-footer">
  <img src="img/one-logoletra.png" alt="ONE" class="footer-logo" onerror="this.replaceWith(document.createTextNode('ONE'))"/>
  <span style="opacity:.3;">·</span>
  <span style="display:flex;align-items:center;gap:5px;">Desarrollado por
    <img src="img/escencial-logoblanco.png" alt="Escencial" class="footer-logo" onerror="this.replaceWith(document.createTextNode('Escencial'))"/>
  </span>
</footer>

</div>
<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script src="js/utils.js"></script>
<script src="js/auth.js"></script>
<script src="js/carga.js"></script>
</body>
</html>
