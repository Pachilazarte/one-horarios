<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>ONE — Informe de Asistencia</title>
<link rel="icon" type="image/png" href="img/favicon.png"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
/* ══ RESET ══ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --c:#6be1e3; --p:#e17bd7; --g:#e4c76a; --pu:#a78bfa;
  --gr:#34d399; --re:#ef4444; --or:#fb923c;
  --ink:#08060f; --ink2:#120f1c; --ink3:#1e1a2e;
  --mi:#c6c9d7; --sl:#6b7280;
  --serif:'DM Serif Display',Georgia,serif;
  --sans:'Outfit',system-ui,sans-serif;
  --page-bg:#f7f6fb;
  --card-bg:#ffffff;
  --border:#e8e6f0;
  --text:#1a1625;
  --text2:#6b7280;
  --text3:#9ca3af;
}

html{scroll-behavior:smooth;}
body{font-family:var(--sans);background:var(--page-bg);color:var(--text);min-height:100vh;overflow-x:hidden;}

/* ══ NAV BAR ══ */
.nav{position:fixed;top:0;left:0;right:0;z-index:200;height:58px;
  background:rgba(10,8,22,.92);backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);
  border-bottom:1px solid rgba(198,201,215,.09);
  display:flex;align-items:center;justify-content:space-between;padding:0 22px;gap:12px;}
.nav-left{display:flex;align-items:center;gap:11px;}
.nav-logo-img{height:30px;}
.nav-title{font-size:15px;font-weight:900;color:#fff;letter-spacing:.02em;}
.nav-title span{background:linear-gradient(90deg,#6be1e3,#a8f1f1);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.nav-sub-txt{font-size:10px;color:rgba(198,201,215,.4);margin-top:1px;}
.nav-sep{width:1px;height:22px;background:rgba(198,201,215,.12);}
.nav-back{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:9px;
  background:rgba(255,255,255,.07);border:1px solid rgba(198,201,215,.18);
  color:rgba(198,201,215,.8);font-family:var(--sans);font-size:12px;font-weight:700;
  cursor:pointer;text-decoration:none;transition:all .2s;}
.nav-back:hover{background:rgba(255,255,255,.13);color:#fff;}
.nav-back svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2.5;}
.nav-badge{padding:3px 10px;border-radius:99px;font-size:11px;font-weight:700;
  background:rgba(107,225,227,.15);border:1px solid rgba(107,225,227,.3);color:#6be1e3;}
.nav-right{display:flex;align-items:center;gap:8px;}
.btn-print{display:inline-flex;align-items:center;gap:6px;padding:8px 18px;border-radius:9px;
  background:linear-gradient(135deg,rgba(107,225,227,.18),rgba(167,139,250,.12));
  border:1px solid rgba(107,225,227,.38);color:#6be1e3;
  font-family:var(--sans);font-size:12px;font-weight:800;cursor:pointer;transition:all .2s;}
.btn-print:hover{background:linear-gradient(135deg,rgba(107,225,227,.3),rgba(167,139,250,.22));transform:translateY(-1px);}
.btn-print svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;}

/* ══ FILTROS ══ */
.filters-bar{position:sticky;top:58px;z-index:100;
  background:rgba(10,8,22,.85);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
  border-bottom:1px solid rgba(198,201,215,.08);padding:10px 22px;
  display:flex;align-items:flex-end;gap:10px;flex-wrap:wrap;}
.f-group{display:flex;flex-direction:column;gap:3px;}
.f-label{font-size:9px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:rgba(198,201,215,.38);}
.f-sel,.f-inp{height:36px;padding:0 12px;border-radius:9px;font-family:var(--sans);font-size:12px;font-weight:600;
  background:rgba(255,255,255,.07);border:1px solid rgba(198,201,215,.16);color:#fff;
  appearance:none;-webkit-appearance:none;cursor:pointer;min-width:150px;}
.f-sel:focus,.f-inp:focus{outline:none;border-color:rgba(107,225,227,.5);}
.f-sel option{background:#0a0816;color:#fff;}
.btn-gen{height:36px;padding:0 20px;border-radius:9px;font-family:var(--sans);font-size:12px;font-weight:800;
  background:rgba(107,225,227,.15);border:1px solid rgba(107,225,227,.38);color:#6be1e3;
  cursor:pointer;transition:all .2s;letter-spacing:.02em;align-self:flex-end;}
.btn-gen:hover{background:rgba(107,225,227,.28);}

/* ══ MAIN ══ */
.main{padding:24px 28px 80px;max-width:1100px;margin:0 auto;}

/* ══ ESTADO VACÍO ══ */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:55vh;gap:16px;text-align:center;animation:fadeUp .4s ease both;}
.empty-icon{font-size:52px;opacity:.4;}
.empty-title{font-family:var(--serif);font-size:28px;color:var(--text);opacity:.5;}
.empty-sub{font-size:13px;color:var(--text3);max-width:300px;line-height:1.6;}

/* ══ LOADING ══ */
.loader{display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:55vh;gap:14px;animation:fadeUp .3s ease both;}
.loader-ring{width:42px;height:42px;border:3px solid rgba(107,225,227,.15);
  border-top-color:var(--c);border-radius:50%;animation:spin .8s linear infinite;}
.loader-steps{display:flex;flex-direction:column;gap:4px;align-items:center;}
.loader-step{font-size:11px;color:var(--text3);transition:color .3s;}
.loader-step.active{color:var(--c);font-weight:600;}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* ══ PORTADA ══ */
.cover{background:linear-gradient(150deg,var(--ink) 0%,var(--ink2) 50%,#0d0a1a 100%);
  border-radius:20px;overflow:hidden;position:relative;margin-bottom:16px;
  animation:fadeUp .5s ease both;}
.cover-stripe{position:absolute;top:0;left:0;width:5px;height:100%;
  background:linear-gradient(180deg,var(--c),var(--p),var(--g));}
.cover-noise{position:absolute;inset:0;opacity:.025;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:200px;}
.cover-glow-tl{position:absolute;top:-120px;right:-80px;width:440px;height:440px;border-radius:50%;
  background:radial-gradient(circle,rgba(107,225,227,.1) 0%,transparent 65%);pointer-events:none;}
.cover-glow-br{position:absolute;bottom:-100px;left:80px;width:360px;height:360px;border-radius:50%;
  background:radial-gradient(circle,rgba(225,123,215,.09) 0%,transparent 65%);pointer-events:none;}
.cover-inner{position:relative;z-index:1;display:grid;grid-template-columns:1fr auto;gap:0;min-height:340px;}
.cover-left{padding:44px 52px;display:flex;flex-direction:column;justify-content:space-between;}
.cover-right{padding:44px 44px 44px 0;display:flex;flex-direction:column;align-items:flex-end;justify-content:space-between;}
.cover-eyebrow{font-size:10px;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:rgba(107,225,227,.7);margin-bottom:10px;}
.cover-h1{font-family:var(--serif);font-size:54px;line-height:.98;color:#fff;margin-bottom:4px;font-style:italic;}
.cover-h1 em{font-style:normal;background:linear-gradient(100deg,var(--c) 0%,var(--p) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.cover-sub{font-size:13px;color:rgba(198,201,215,.45);margin-top:10px;font-weight:400;line-height:1.5;}
.cover-pills{display:flex;gap:8px;flex-wrap:wrap;margin-top:20px;}
.cpill{padding:5px 13px;border-radius:99px;font-size:11px;font-weight:700;border:1px solid;}
.cpill-c{background:rgba(107,225,227,.12);border-color:rgba(107,225,227,.3);color:var(--c);}
.cpill-p{background:rgba(167,139,250,.12);border-color:rgba(167,139,250,.3);color:var(--pu);}
.cpill-d{background:rgba(198,201,215,.06);border-color:rgba(198,201,215,.18);color:rgba(198,201,215,.6);}
.cover-kpis{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;width:230px;}
.ckpi{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:14px 16px;position:relative;overflow:hidden;}
.ckpi::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
.ckpi-c::before{background:linear-gradient(90deg,var(--c),#a8f1f1);}
.ckpi-p::before{background:linear-gradient(90deg,var(--pu),#c4b5fd);}
.ckpi-g::before{background:linear-gradient(90deg,var(--gr),#86efac);}
.ckpi-r::before{background:linear-gradient(90deg,var(--re),#fca5a5);}
.ckpi-go::before{background:linear-gradient(90deg,var(--g),#fde68a);}
.ckpi-val{font-size:26px;font-weight:900;line-height:1;font-family:var(--sans);}
.ckpi-lbl{font-size:8.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:rgba(198,201,215,.4);margin-top:4px;}
.cover-logos{display:flex;align-items:center;gap:10px;}
.cover-logo-one{height:32px;}
.cover-logo-esc{height:20px;filter:brightness(0) invert(1);opacity:.5;}
.cover-date{font-size:10px;color:rgba(198,201,215,.28);margin-top:8px;text-align:right;}

/* ══ SECCIÓN CARD ══ */
.section{background:var(--card-bg);border-radius:16px;padding:28px 30px;margin-bottom:16px;
  border:1px solid var(--border);animation:fadeUp .4s ease both;}
.section+.section{animation-delay:.05s;}
.sec-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;gap:16px;}
.sec-num{font-size:10px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--text3);margin-bottom:4px;}
.sec-title{font-family:var(--serif);font-size:22px;color:var(--text);display:flex;align-items:center;gap:10px;}
.sec-accent{width:3px;height:22px;border-radius:2px;flex-shrink:0;}
.sec-divider{height:1px;background:var(--border);margin:16px 0;}
.sec-body{font-size:13px;line-height:1.8;color:var(--text2);}

/* ══ KPI CARDS (en sección) ══ */
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:22px;}
.kpi{background:linear-gradient(135deg,#f9f8fd,#f4f2fa);border:1px solid var(--border);
  border-radius:12px;padding:16px 14px;text-align:center;position:relative;overflow:hidden;}
.kpi::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;}
.kpi-puntual::after{background:linear-gradient(90deg,var(--gr),#86efac);}
.kpi-tarde::after{background:linear-gradient(90deg,var(--re),#fca5a5);}
.kpi-prom::after{background:var(--g);}
.kpi-extra::after{background:var(--g);}
.kpi-val{font-size:28px;font-weight:900;line-height:1;font-family:var(--sans);}
.kpi-lbl{font-size:8.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-top:4px;}
.kpi-sub{font-size:10px;color:var(--text3);margin-top:2px;}

/* ══ GRÁFICOS ══ */
.charts-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:18px;}
.charts-2{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:18px;}
.chart-card{background:linear-gradient(135deg,#f9f8fd,#f4f2fa);border:1px solid var(--border);border-radius:12px;padding:16px 14px;}
.chart-title{font-size:9.5px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--text3);margin-bottom:12px;}
.chart-wrap{position:relative;height:150px;}
.chart-wrap-lg{position:relative;height:200px;}

/* ══ INSIGHT ══ */
.insight{border-radius:12px;padding:16px 18px;margin-bottom:12px;display:flex;gap:12px;align-items:flex-start;}
.ins-green{background:#f0fdf4;border:1px solid #bbf7d0;}
.ins-red{background:#fef2f2;border:1px solid #fecaca;}
.ins-amber{background:#fffbeb;border:1px solid #fde68a;}
.ins-blue{background:#eff6ff;border:1px solid #bfdbfe;}
.ins-purple{background:#faf5ff;border:1px solid #e9d5ff;}
.ins-cyan{background:#ecfeff;border:1px solid #a5f3fc;}
.ins-icon{font-size:20px;flex-shrink:0;line-height:1.3;margin-top:1px;}
.ins-title{font-size:12px;font-weight:700;color:var(--text);margin-bottom:3px;}
.ins-body{font-size:12px;line-height:1.7;color:var(--text2);}

/* ══ BARRAS HORIZONTALES ══ */
.hbar-list{display:flex;flex-direction:column;gap:14px;}
.hbar{display:flex;flex-direction:column;gap:4px;}
.hbar-top{display:flex;align-items:center;justify-content:space-between;gap:8px;}
.hbar-name{display:flex;align-items:center;gap:7px;font-size:12px;font-weight:600;color:var(--text);}
.hbar-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.hbar-val{font-size:12px;font-weight:800;flex-shrink:0;}
.hbar-track{height:6px;background:#ede9f8;border-radius:3px;overflow:hidden;}
.hbar-fill{height:100%;border-radius:3px;transition:width .6s cubic-bezier(.4,0,.2,1);}
.hbar-meta{font-size:10px;color:var(--text3);}
.hbar-empty{color:var(--text3);font-size:12px;text-align:center;padding:18px 0;font-style:italic;}

/* ══ TABLA ÁREAS ══ */
.atbl{width:100%;border-collapse:collapse;font-size:12px;}
.atbl thead tr{background:#f9f8fd;border-bottom:2px solid var(--border);}
.atbl th{padding:9px 11px;text-align:left;font-size:9px;font-weight:700;color:var(--text3);
  text-transform:uppercase;letter-spacing:.08em;white-space:nowrap;}
.atbl td{padding:10px 11px;border-bottom:1px solid #f0eef8;vertical-align:middle;}
.atbl tr:last-child td{border-bottom:none;}
.atbl tr:hover td{background:#faf9fd;}
.pct-bar{height:5px;background:#ede9f8;border-radius:3px;overflow:hidden;min-width:60px;}
.pct-fill{height:100%;border-radius:3px;}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:99px;font-size:10px;font-weight:700;}
.b-green{background:#dcfce7;color:#15803d;}
.b-red{background:#fee2e2;color:#dc2626;}
.b-amber{background:#fef9c3;color:#b45309;}
.b-blue{background:#dbeafe;color:#1d4ed8;}
.b-gray{background:#f3f4f6;color:#4b5563;}
.b-cyan{background:#cffafe;color:#0e7490;}
.area-chip{display:inline-flex;align-items:center;gap:5px;font-weight:700;font-size:11px;}

/* ══ RECOMENDACIONES ══ */
.recs{display:flex;flex-direction:column;gap:10px;}
.rec{border-left:3px solid;border-radius:0 10px 10px 0;padding:13px 15px;background:#f9f8fd;}
.rec-num{font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);margin-bottom:3px;}
.rec-title{font-size:12.5px;font-weight:800;color:var(--text);margin-bottom:3px;}
.rec-body{font-size:12px;line-height:1.65;color:var(--text2);}

/* ══ TABLA REGISTROS ══ */
.dtbl{width:100%;border-collapse:collapse;font-size:11.5px;}
.dtbl thead tr{background:#f9f8fd;border-bottom:2px solid var(--border);}
.dtbl th{padding:8px 10px;text-align:left;font-size:9px;font-weight:700;color:var(--text3);
  text-transform:uppercase;letter-spacing:.08em;white-space:nowrap;}
.dtbl td{padding:8px 10px;border-bottom:1px solid #f0eef8;vertical-align:middle;}
.dtbl tr:last-child td{border-bottom:none;}
.dtbl tr:hover td{background:#faf9fd;}
.tbl-wrap{overflow-x:auto;border-radius:10px;border:1px solid var(--border);}

/* ══ CIERRE ══ */
.closing{background:linear-gradient(150deg,var(--ink),var(--ink2));border-radius:16px;
  padding:36px 40px;text-align:center;border:1px solid rgba(255,255,255,.06);margin-top:8px;}
.closing-logos{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:16px;}
.closing-logo-one{height:30px;}
.closing-logo-esc{height:18px;filter:brightness(0) invert(1);opacity:.5;}
.closing-title{font-family:var(--serif);font-size:22px;color:#fff;margin-bottom:6px;}
.closing-title em{font-style:normal;background:linear-gradient(90deg,var(--c),var(--p));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.closing-sub{font-size:11px;color:rgba(198,201,215,.35);line-height:1.7;}

/* ══ PRINT ══ */
@media print{
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;}
  body{background:#fff!important;}
  .nav,.filters-bar{display:none!important;}
  .main{padding:0!important;max-width:100%!important;}
  .cover{border-radius:0!important;page-break-after:always;}
  .section{box-shadow:none!important;page-break-inside:avoid;border:1px solid #eee!important;}
  .charts-3,.charts-2{page-break-inside:avoid;}
  @page{margin:10mm;size:A4;}
}

/* ══ RESPONSIVE ══ */
@media(max-width:700px){
  .cover-inner{grid-template-columns:1fr;}
  .cover-right{padding:0 28px 28px;align-items:flex-start;}
  .cover-kpis{grid-template-columns:repeat(4,1fr);width:100%;}
  .kpi-row,.charts-3,.charts-2{grid-template-columns:1fr 1fr;}
  .filters-bar{flex-direction:column;align-items:stretch;}
  .f-sel{min-width:unset;}
}
</style>
</head>
<body>

<!-- ══ NAV ══ -->
<nav class="nav">
  <div class="nav-left">
    <img src="img/one-logocolor.png" class="nav-logo-img" onerror="this.style.display='none'"/>
    <div>
      <div class="nav-title">ONE <span>Horarios</span></div>
      <div class="nav-sub-txt">Informe de Asistencia</div>
    </div>
    <div class="nav-sep"></div>
    <a href="admin.html" class="nav-back">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      Volver al panel
    </a>
    <span class="nav-badge" id="navBadge" style="display:none;"></span>
  </div>
  <div class="nav-right">
    <button class="btn-print" onclick="window.print()">
      <svg viewBox="0 0 24 24"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
      Guardar como PDF
    </button>
  </div>
</nav>

<!-- ══ FILTROS ══ -->
<div class="filters-bar">
  <div class="f-group">
    <label class="f-label">Período</label>
    <select class="f-sel" id="iPer" onchange="onPerChange()">
      <option value="hoy">Hoy</option>
      <option value="ayer">Ayer</option>
      <option value="semana" selected>Esta semana</option>
      <option value="semana_ant">Semana anterior</option>
      <option value="mes">Este mes</option>
      <option value="mes_ant">Mes anterior</option>
      <option value="anio">Este año</option>
      <option value="dia_especifico">Día específico...</option>
      <option value="todos">Todos</option>
    </select>
  </div>
  <div class="f-group" id="diaEspGrp" style="display:none;">
    <label class="f-label">Fecha</label>
    <input class="f-inp" type="date" id="iDiaEsp"/>
  </div>
  <div class="f-group">
    <label class="f-label">Área</label>
    <select class="f-sel" id="iArea">
      <option value="">Todas las áreas</option>
      <option>ADMINISTRACION</option><option>COMERCIAL</option>
      <option>RECURSOS HUMANOS</option><option>MARKETING</option>
      <option>ACADEMICO / GT</option><option>INNOVACION Y DESARROLLO</option>
      <option>MAESTRANZA</option>
    </select>
  </div>
  <button class="btn-gen" onclick="generar()">▶&nbsp; Generar informe</button>
</div>

<!-- ══ CONTENIDO ══ -->
<div class="main">
  <!-- Estado inicial -->
  <div class="empty-state" id="stateEmpty">
    <div class="empty-icon">📊</div>
    <div class="empty-title">Informe de Asistencia</div>
    <div class="empty-sub">Seleccioná el período y área deseados, luego presioná "Generar informe".</div>
  </div>

  <!-- Loading -->
  <div class="loader" id="stateLoading" style="display:none;">
    <div class="loader-ring"></div>
    <div class="loader-steps">
      <div class="loader-step" id="ls0">Consultando registros...</div>

const _ld=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;

const calcHs=(e,s)=>{if(!e||!s)return null;const[eh,em]=e.split(':').map(Number);const[sh,sm]=s.split(':').map(Number);const m=(sh*60+sm)-(eh*60+em);return m>0?m/60:null;};
const fmtHs=h=>{if(h===null||h===undefined)return'—';const hr=Math.floor(h);const mn=Math.round((h-hr)*60);return mn>0?hr+'h '+mn+'m':hr+'h';};
const calcTard=(p,r)=>{if(!p||!r)return null;const[ph,pm]=p.split(':').map(Number);const[rh,rm]=r.split(':').map(Number);return(rh*60+rm)-(ph*60+pm);};
const calcExtra=(p,r)=>{if(!p||!r)return null;const[ph,pm]=p.split(':').map(Number);const[rh,rm]=r.split(':').map(Number);const d=(rh*60+rm)-(ph*60+pm);return d>0?d:0;};

/* ══ CALCULAR STATS ══ */
function calcStats(rows){
  const withPlan=rows.filter(r=>{
    if(!r.turno||!r.hora_entrada||r.turno==='Flex'||r.turno==='Guardia')return false;
    return r.turno.split(ARROW)[0].trim().match(/^\d{2}:\d{2}$/);
  });
  const allD=withPlan.map(r=>({r,d:calcTard(r.turno.split(ARROW)[0].trim(),r.hora_entrada.slice(0,5))})).filter(x=>x.d!==null);
  const diffs=allD.map(x=>x.d);
  const puntual=diffs.filter(d=>d<=0).length,tarde=diffs.filter(d=>d>0).length;
  const promTard=diffs.length?Math.round(diffs.reduce((a,b)=>a+b,0)/diffs.length):0;
  const conHs=rows.filter(r=>r.hora_entrada&&r.hora_salida&&r.turno!=='Flex'&&r.turno!=='Guardia');
  const totHs=conHs.reduce((acc,r)=>{const h=calcHs(r.hora_entrada.slice(0,5),r.hora_salida.slice(0,5));return h?acc+h:acc;},0);
  const promHs=conHs.length?totHs/conHs.length:0;

  const em={};
  rows.forEach(r=>{
    if(!r.turno||!r.hora_entrada||!r.hora_salida||r.turno==='Flex'||r.turno==='Guardia')return;
    const pts=r.turno.split(ARROW);if(pts.length<2)return;
    const ps=pts[1].trim().slice(0,5);if(!ps.match(/^\d{2}:\d{2}$/))return;
    const ex=calcExtra(ps,r.hora_salida.slice(0,5));if(!ex||ex<=0)return;
    if(!em[r.nombre])em[r.nombre]={nombre:r.nombre,area:r.area,totalMin:0,veces:0};
    em[r.nombre].totalMin+=ex;em[r.nombre].veces++;
  });
  const topExtra=Object.values(em).sort((a,b)=>b.totalMin-a.totalMin).slice(0,8);

  const tm={};
  allD.filter(x=>x.d>0).forEach(x=>{
    const r=x.r;
    if(!tm[r.nombre])tm[r.nombre]={nombre:r.nombre,area:r.area,totalMin:0,veces:0};
    tm[r.nombre].totalMin+=x.d;tm[r.nombre].veces++;
  });
  const topTard=Object.values(tm).sort((a,b)=>b.totalMin-a.totalMin).slice(0,8);

  const byArea=AREAS.map(a=>{
    const ar=rows.filter(r=>r.area===a);if(!ar.length)return null;
    const ad=ar.filter(r=>r.turno&&r.hora_entrada&&r.turno.includes(':')&&r.turno!=='Flex'&&r.turno!=='Guardia')
      .map(r=>{const e=r.turno.split(ARROW)[0].trim();return e.match(/^\d{2}:\d{2}$/)?calcTard(e,r.hora_entrada.slice(0,5)):null;}).filter(d=>d!==null);
    const hsA=ar.filter(r=>r.hora_entrada&&r.hora_salida&&r.turno!=='Flex'&&r.turno!=='Guardia');
    const totA=hsA.reduce((acc,r)=>{const h=calcHs(r.hora_entrada.slice(0,5),r.hora_salida.slice(0,5));return h?acc+h:acc;},0);
    return{area:a,registros:ar.length,punt:ad.filter(d=>d<=0).length,
      conTard:ad.filter(d=>d>0).length,totalDiffs:ad.length,
      prom:ad.length?Math.round(ad.reduce((x,y)=>x+y,0)/ad.length):null,
      promHs:hsA.length?totA/hsA.length:0};
  }).filter(Boolean);

  const byDay={};
  rows.forEach(r=>{byDay[r.fecha]=(byDay[r.fecha]||0)+1;});
  const pct=Math.round(puntual/Math.max(puntual+tarde,1)*100);
  return{puntual,tarde,promTard,promHs,totHs,topExtra,topTard,byArea,byDay,
    total:rows.length,personas:new Set(rows.map(r=>r.nombre)).size,pct};
}

  const punt=pct>=90
    ?'El equipo demostró una puntualidad <strong>sobresaliente del '+pct+'%</strong>, con apenas '+tarde+' registro'+(tarde!==1?'s':'')+' con demora. Este resultado evidencia un alto nivel de compromiso y cultura organizacional consolidada.'
    :pct>=75
    ?'La puntualidad fue del <strong>'+pct+'%</strong>, resultado satisfactorio. Promedio de tardanza: <strong>'+(promTard>0?'+':'')+promTard+' min</strong>. Hay oportunidades de mejora puntuales en algunos colaboradores.'
    :pct>=50
    ?'Se registró un <strong>'+pct+'% de puntualidad</strong>, con '+tarde+' marcaciones demoradas. Un promedio de <strong>'+(promTard>0?'+':'')+promTard+' min</strong> sugiere revisar las causas recurrentes y establecer un plan de acompañamiento.'
    :'La puntualidad del <strong>'+pct+'%</strong> requiere atención prioritaria. Con '+tarde+' tardanzas y promedio de <strong>+'+promTard+' min</strong>, se recomienda implementar un plan de mejora inmediato con seguimiento semanal.';

  const extra=topExtra.length>0
    ?'Se detectaron horas extra post-salida en <strong>'+topExtra.length+' colaborador'+(topExtra.length!==1?'es':'')+'</strong>. <strong>'+topExtra[0].nombre+'</strong> acumuló <strong>'+fmtHs(topExtra[0].totalMin/60)+'</strong> en '+topExtra[0].veces+' jornada'+(topExtra[0].veces!==1?'s':'')+'. Esto puede reflejar compromiso, pero también indica posible sobrecarga que merece atención.'
    :'No se registraron horas extra post-salida. El equipo respetó los tiempos planificados de finalización de jornada.';

  let areas='';
  if(byArea.length>0){
    const mr=byArea.reduce((a,b)=>a.registros>=b.registros?a:b);
    areas='<strong>'+mr.area+'</strong> fue el área con mayor actividad ('+mr.registros+' registros). ';
    const mp=byArea.filter(a=>a.totalDiffs>0).sort((a,b)=>(b.punt/b.totalDiffs)-(a.punt/a.totalDiffs))[0];
    if(mp)areas+='<strong>'+mp.area+'</strong> lideró en puntualidad con un <strong>'+Math.round(mp.punt/mp.totalDiffs*100)+'%</strong>.';
  }

  const recs=[];
  if(pct<85&&topTard.length>0)
    recs.push({t:'Seguimiento de puntualidad',c:'#ef4444',b:topTard.slice(0,3).map(p=>p.nombre).join(', ')+' concentran la mayor acumulación de tardanzas del período. Se recomienda un diálogo individual con cada uno para identificar causas y establecer acuerdos de mejora concretos.'});
  if(topExtra.length>3)
    recs.push({t:'Gestión de carga laboral',c:'#e4c76a',b:topExtra.length+' personas registran horas extra recurrentes. Evaluar si responde a picos de trabajo temporales o a una distribución desbalanceada de tareas. Considerar reconocimiento formal del tiempo aportado.'});
  if(byArea.some(a=>a.prom!==null&&a.prom>10))
    recs.push({t:'Revisión de horarios',c:'#a78bfa',b:'Las áreas con mayor promedio de tardanza podrían beneficiarse de una revisión de sus horarios de ingreso planificados. En algunos casos, flexibilizar el horario de entrada puede mejorar la puntualidad sin afectar la productividad.'});
  if(pct>=90)
    recs.push({t:'Reconocimiento del equipo',c:'#34d399',b:'La excelente puntualidad del período merece ser destacada y comunicada al equipo. El reconocimiento refuerza la cultura organizacional y consolida comportamientos positivos que impactan directamente en la productividad.'});
  if(recs.length===0)
    recs.push({t:'Continuidad y monitoreo',c:'#6be1e3',b:'Los indicadores del período son positivos. Mantener las buenas prácticas actuales y continuar el monitoreo semanal para identificar variaciones tempranas y actuar de manera preventiva.'});

  return{resumen,punt,extra,areas,recs};
}

  const recs50=[...rows].sort((a,b)=>b.fecha.localeCompare(a.fecha)).slice(0,50);
  html+='<div class="section">'
    +'<div class="sec-num">06 — Detalle de Registros</div>'
    +'<div class="sec-title" style="margin-bottom:14px;"><div class="sec-accent" style="background:var(--sl,#6b7280)"></div>Últimos '+recs50.length+' Registros del Período</div>'
    +'<div class="tbl-wrap">'+regTableHTML(recs50)+'</div>'
    +'</div>';

  /* Cierre */
  html+='<div class="closing">'
    +'<div class="closing-logos">'
    +'<img src="img/one-logocolor.png" class="closing-logo-one" onerror="this.style.display=\'none\'"/>'
    +'<img src="img/escencial-logoblanco.png" class="closing-logo-esc" onerror="this.style.display=\'none\'"/>'
    +'</div>'
    +'<div class="closing-title">ONE <em>Horarios</em></div>'
    +'<div class="closing-sub">Sistema de Gestión de Asistencia · Escencial Consultora<br>Informe generado el '+ds+'</div>'
    +'</div>';

  return html;
}

/* ══ HBAR HTML ══ */
function hbarHTML(list,valFn,color,metaFn){
  if(!list.length)return'<div class="hbar-empty">Sin datos para este período</div>';
  const maxV=list[0].totalMin;
  return'<div class="hbar-list">'+list.map((p,i)=>{
    const col=ACOLOR[p.area]||'#9ca3af';
    const raw=valFn(p);
    const pct=maxV>0?Math.round(p.totalMin/maxV*100):0;
    const fill=i===0?color:color+'bb';
    return'<div class="hbar">'
      +'<div class="hbar-top">'
      +'<div class="hbar-name"><div class="hbar-dot" style="background:'+col+'"></div>'+(i+1)+'. '+esc(p.nombre)+'</div>'
      +'<span class="hbar-val" style="color:'+color+';">'+raw+'</span>'
      +'</div>'
      +'<div class="hbar-track"><div class="hbar-fill" style="width:'+pct+'%;background:'+fill+';"></div></div>'
      +'<div class="hbar-meta">'+metaFn(p)+'</div>'
      +'</div>';
  }).join('')+'</div>';
}

/* ══ AREA TABLE HTML ══ */
function areaTableHTML(byArea){
  if(!byArea.length)return'<div class="hbar-empty">Sin datos de áreas</div>';
  return'<table class="atbl"><thead><tr>'
    +'<th>Área</th><th>Registros</th><th>Puntuales</th><th>Con tard.</th>'
    +'<th>Prom. tard.</th><th>Prom. jornada</th><th style="min-width:130px">Puntualidad</th>'
    +'</tr></thead><tbody>'
    +byArea.map((a,i)=>{
      const col=ACOLOR[a.area]||'#9ca3af';
      const pctA=a.totalDiffs>0?Math.round(a.punt/a.totalDiffs*100):0;
      const pCol=a.prom===null?'var(--text3)':a.prom>10?'#dc2626':a.prom>0?'#b45309':'#15803d';
      const pTxt=a.prom===null?'—':(a.prom>0?'+':'')+a.prom+'m';
      const bCol=pctA>=80?'#34d399':pctA>=60?'#e4c76a':'#ef4444';
      return'<tr>'
        +'<td><div class="area-chip"><div class="hbar-dot" style="background:'+col+'"></div>'
        +'<span style="color:'+col+';font-weight:700;">'+esc(a.area)+'</span></div></td>'
        +'<td style="font-weight:700;text-align:center;">'+a.registros+'</td>'
        +'<td style="text-align:center;"><span class="badge b-green">'+a.punt+'</span></td>'
        +'<td style="text-align:center;"><span class="badge b-red">'+a.conTard+'</span></td>'
        +'<td style="text-align:center;font-weight:700;color:'+pCol+';">'+pTxt+'</td>'
        +'<td style="text-align:center;">'+( a.promHs>0?fmtHs(a.promHs):'—')+'</td>'
        +'<td><div style="display:flex;align-items:center;gap:8px;">'
        +'<span style="font-weight:800;color:'+bCol+';font-size:12px;min-width:32px;">'+pctA+'%</span>'
        +'<div class="pct-bar" style="flex:1;"><div class="pct-fill" style="width:'+pctA+'%;background:'+bCol+';"></div></div>'
        +'</div></td>'
        +'</tr>';
    }).join('')
    +'</tbody></table>';
}

/* ══ REG TABLE HTML ══ */
function regTableHTML(rows){
  return'<table class="dtbl"><thead><tr>'
    +'<th>Área</th><th>Nombre</th><th>Fecha</th>'
    +'<th>Entrada</th><th>Salida</th><th>Horas</th><th>Tardanza</th>'
    +'</tr></thead><tbody>'
    +rows.map(r=>{
      const col=ACOLOR[r.area]||'#9ca3af';
      const hs=calcHs(r.hora_entrada?.slice(0,5),r.hora_salida?.slice(0,5));
      const turno=r.turno||'';
      let tardCell='<span class="badge b-gray">—</span>';
      if(turno==='Flex')      tardCell='<span class="badge b-blue">Flex</span>';
      else if(turno==='Guardia') tardCell='<span class="badge b-amber">Guardia</span>';
      else if(turno.includes(':')&&r.hora_entrada){
        const pe=turno.split(ARROW)[0].trim();
        if(pe.match(/^\d{2}:\d{2}$/)){
          const diff=calcTard(pe,r.hora_entrada.slice(0,5));
          if(diff!==null) tardCell=diff<=0
            ?'<span class="badge b-green">'+(diff<0?diff+'m ant.':'✓ Exacto')+'</span>'
            :'<span class="badge b-red">+'+diff+'m</span>';
        }
      }
      return'<tr>'
        +'<td><div style="display:flex;align-items:center;gap:5px;">'
        +'<div class="hbar-dot" style="background:'+col+'"></div>'
        +'<span style="font-size:10px;font-weight:700;color:'+col+';">'+esc(r.area.split(' ')[0])+'</span>'
        +'</div></td>'
        +'<td style="font-weight:600;">'+esc(r.nombre)+'</td>'
        +'<td>'+fmt(r.fecha)+'</td>'
        +'<td style="font-weight:700;">'+( r.hora_entrada?.slice(0,5)||'—')+'</td>'
        +'<td>'+(r.hora_salida?.slice(0,5)||'—')+'</td>'
        +'<td>'+(hs!==null?'<span class="badge b-cyan">'+fmtHs(hs)+'</span>':'—')+'</td>'
        +'<td>'+tardCell+'</td>'
        +'</tr>';
    }).join('')
    +'</tbody></table>';
}

/* ══ BUILD CHARTS (llamado DESPUÉS del render) ══ */
function buildCharts(s){
  const def={responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}}};

  /* Área doughnut */
  mkChart('cArea',{type:'doughnut',data:{
    labels:AREAS.map(a=>a.split(' ')[0]),
    datasets:[{data:AREAS.map(a=>s.byArea.find(x=>x.area===a)?.registros||0),
      backgroundColor:Object.values(ACOLOR).map(c=>c+'99'),
      borderColor:Object.values(ACOLOR),borderWidth:2,hoverOffset:6}]
  },options:{...def,plugins:{legend:{display:true,position:'bottom',
    labels:{color:'#6b7280',font:{size:9,family:'Outfit'},boxWidth:9,padding:5}}}}});

  /* Puntualidad bar */
  mkChart('cPunt',{type:'bar',data:{
    labels:s.byArea.map(a=>a.area.split(' ')[0]),
    datasets:[{data:s.byArea.map(a=>a.totalDiffs>0?Math.round(a.punt/a.totalDiffs*100):0),
      backgroundColor:s.byArea.map(a=>(ACOLOR[a.area]||'#9ca3af')+'77'),
      borderColor:s.byArea.map(a=>ACOLOR[a.area]||'#9ca3af'),
      borderWidth:2,borderRadius:4,borderSkipped:false}]
  },options:{...def,scales:{
    y:{min:0,max:100,ticks:{color:'#9ca3af',font:{size:9}},grid:{color:'#f0eef8'}},
    x:{ticks:{color:'#6b7280',font:{size:8}},grid:{display:false}}}}});

  /* Por día line */
  const days=Object.keys(s.byDay).sort();
  mkChart('cDia',{type:'line',data:{
    labels:days.map(d=>fmt(d)),
    datasets:[{data:days.map(d=>s.byDay[d]),
      borderColor:'#6be1e3',backgroundColor:'rgba(107,225,227,.1)',
      fill:true,tension:.4,pointBackgroundColor:'#6be1e3',
      pointRadius:4,pointHoverRadius:6}]
  },options:{...def,scales:{
    y:{ticks:{color:'#9ca3af',font:{size:9},stepSize:1},grid:{color:'#f0eef8'}},
    x:{ticks:{color:'#6b7280',font:{size:8},maxTicksLimit:7},grid:{display:false}}}}});

  /* Puntualidad área bar tall */
  mkChart('cPunt2',{type:'bar',data:{
    labels:s.byArea.map(a=>a.area.split(' ')[0]),
    datasets:[{data:s.byArea.map(a=>a.totalDiffs>0?Math.round(a.punt/a.totalDiffs*100):0),
      backgroundColor:s.byArea.map(a=>(ACOLOR[a.area]||'#9ca3af')+'66'),
      borderColor:s.byArea.map(a=>ACOLOR[a.area]||'#9ca3af'),
      borderWidth:2,borderRadius:6,borderSkipped:false}]
  },options:{...def,plugins:{legend:{display:false}},scales:{
    y:{min:0,max:100,ticks:{color:'#9ca3af',font:{size:10}},grid:{color:'#f0eef8'}},
    x:{ticks:{color:'#374151',font:{size:11,weight:'600',family:'Outfit'}},grid:{display:false}}}}});
}

/* ══ GENERAR ══ */
async function generar(){
  const per  = document.getElementById('iPer').value;
  const area = document.getElementById('iArea').value;
  if(per==='dia_especifico'&&!document.getElementById('iDiaEsp').value){
    document.getElementById('iDiaEsp').focus(); return;
  }

  showState('stateLoading');
  setStep(0);

  const PL={hoy:'HOY',ayer:'AYER',semana:'SEMANA EN CURSO',semana_ant:'SEMANA ANTERIOR',
    mes:'MES EN CURSO',mes_ant:'MES ANTERIOR',anio:'AÑO EN CURSO',
    dia_especifico:'DÍA ESPECÍFICO',todos:'PERÍODO COMPLETO'};
  const pl=PL[per]||per.toUpperCase();
  const plLow=pl.charAt(0)+pl.slice(1).toLowerCase();
  const {desde,hasta}=getRange(per);
  const fr=desde?(desde===hasta?fmt(desde):fmt(desde)+' — '+fmt(hasta)):'';
  const ds=new Date().toLocaleDateString('es-AR',{day:'2-digit',month:'long',year:'numeric'});

  try{
    // Badge en nav
    const badge=document.getElementById('navBadge');
    if(badge){badge.textContent=plLow+(area?' · '+area.split(' ')[0]:'');badge.style.display='';}

    let q=SB.from('registros').select('*').order('fecha',{ascending:true});
    if(desde)q=q.gte('fecha',desde);
    if(hasta)q=q.lte('fecha',hasta);
    if(area) q=q.eq('area',area);
    const{data:rows}=await q;

    setStep(1);
    const s=calcStats(rows||[]);

    setStep(2);
    const an=anlz(s,per);

    setStep(3);
    const html=renderReport(rows||[],s,an,per,area,ds,plLow,fr);

    const div=document.getElementById('stateReport');
    div.innerHTML=html;
    showState('stateReport');

    // Construir gráficos DESPUÉS de que el DOM esté listo
    requestAnimationFrame(()=>setTimeout(()=>buildCharts(s),60));

    // Scroll top
    window.scrollTo({top:0,behavior:'smooth'});

  }catch(e){
    console.error(e);
    showState('stateEmpty');
    alert('Error generando informe: '+e.message);
  }
}

/* ══ INIT desde URL params ══ */
window.addEventListener('DOMContentLoaded',()=>{
  const p=new URLSearchParams(location.search);
  const per=p.get('per'),area=p.get('area');
  if(per){
    document.getElementById('iPer').value=per;
    onPerChange();
  }
  if(area) document.getElementById('iArea').value=area;
  if(per) generar();
});
</script>
